{{define "carCollection"}}
<div class="car-collection">
    <div class="collection-hero">
        <p class=""> Featured Cars</p>
        <p class="total-cars"> {{ len .Cars }} Cars</p>
    </div>
    <div class="car-grid">
        {{range .Cars}}

        {{template "carCard" .}}

        {{end}}
    </div>



</div>
{{end}}
