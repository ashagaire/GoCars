{{ define "header"}}
<header class="header">
    <div class="header-content">
        <a href="/" class="logo"> <i class="fa-solid fa-car"></i> GoCars</a>
        <nav class="nav-links">
            <a href="/compare" id="compare-link" class="{{if eq . `compare` }} selected {{end}}">
                <i class="fa-solid fa-code-compare"></i>
                Compare
                <span id="compare-badge"
                    style="background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; display: none;">0</span>
            </a>
            <a href="/manufacturers" class="{{if eq . `manufacturer` }} selected {{end}}">
                <i class="fa-solid fa-industry"></i>
                Manufacturers</a>

        </nav>
    </div>
</header>
{{end}}
