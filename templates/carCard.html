{{ define "carCard" }}

<div class="car-card">
    <div class="car-card-grid">
        <div class="car-image-container">
            <a href="/{{.ID}}" class="" style="height: 0px; width: 0x;">
                <img src="/api-car-images/{{.Image}}" href="/{{.ID}}" class="car-image">
            </a>
            <!-- <img src="/api-car-images/{{.Image}}"> -->

            <!-- Here goes car image -->
            <!-- <h3>"../api/img/{{.Image}}"</h3> -->
        </div>
        <div class="car-content">
            <div class="car-details-cols" style="justify-content: space-between;">
                <h3 class="name">{{.Name}}</h3>
                <span class="year">{{.Year}}</span>
            </div>
            <p style="color: #b3b1ad; margin-top: 8px; font-size: 18px;">{{.Manufacturer}}</p>
            <div class="car-details-cols">
                <div class="car-details-grid-row">
                    <span style="color: #b3b1ad; margin-top: 8px; font-size: 16px;">HP</span>

                    <span style="margin-top: 4px; font-size: 20px;">{{.Category}}</span>

                </div>

            </div>



        </div>
    </div>




</div>
{{end}}
