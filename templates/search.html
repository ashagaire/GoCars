{{define "search"}}

<section class="search">
    <div class="filter-header">
        <h4> Advanced Search & Filter </h4>
    </div>
    <form class="filter-form" method="GET" action="/">
        <div class="filter-field">   
            <label>Search</label>
            <input type="text" name="q" placeholder="Search cars..." value="{{.Filter.Query}}">
        </div>
        <a href="/" class="clear-link">Clear filters</a>
        <fieldset>
            <legend>Manufacturers</legend>
            {{range .Manufacturers}}
            <label>
                <input type="checkbox" name="manufacturer_id" value="{{.ID}}" {{if isSelected $.Filter.ManufacturerIDs .ID}} checked {{end}}>
                {{.Name}}
            </label>
            {{end}}
        </fieldset>
        
        <label> Category   
        <select name="category_id">
            <option value="">Any Category</option>
            {{range .Categories}}
            <option value="{{.ID}}" {{if isSelected $.Filter.CategoryIDs .ID}} selected {{end}}>
                {{.Name}}
            </option>
            {{end}}
        </select>
        </label>            
            
        <div class="year-group">
            <legend>Year Range</legend>
            <input type="number" name="year_from" placeholder="From"  value="{{if ne .Filter.YearFrom 0}}{{.Filter.YearFrom}}{{end}}" >
            <span>-</span>
            <input type="number" name="year_to" placeholder="To" value="{{if ne .Filter.YearTo 0}}{{.Filter.YearTo}}{{end}}">
        </div>
        
        <button type="submit">Search</button>
        
        
    </form>
</section>    


{{end}}
